name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://search-agent.webaby.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='frontend/.angular' \
            --exclude='backend/.venv' \
            --exclude='backend/__pycache__' \
            --exclude='backend/app/__pycache__' \
            --exclude='backend/app/graph/__pycache__' \
            -czf /tmp/search-agent.tar.gz .

      - name: Prepare SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null
          ssh-keyscan -p 2222 -H 95.158.64.196 >> ~/.ssh/known_hosts

      - name: Upload bundle
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: scp -P 2222 -i ~/.ssh/id_rsa /tmp/search-agent.tar.gz "$DEPLOY_USER@95.158.64.196:/tmp/search-agent.tar.gz"

      - name: Deploy on server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          TARGET_PATH="${DEPLOY_PATH:-/home/webaby/search-agent}"
          ssh -i ~/.ssh/id_rsa -p 2222 "$DEPLOY_USER@95.158.64.196" "TARGET_PATH='$TARGET_PATH' OPENAI_API_KEY='$OPENAI_API_KEY' OPENAI_MODEL='$OPENAI_MODEL' DATABASE_URL='$DATABASE_URL' JWT_SECRET='$JWT_SECRET' POSTGRES_DB='$POSTGRES_DB' POSTGRES_USER='$POSTGRES_USER' POSTGRES_PASSWORD='$POSTGRES_PASSWORD' bash -s" <<'EOF'
          set -e
          if [ -z "$TARGET_PATH" ] || [ "$TARGET_PATH" = "/" ]; then
            echo "Invalid TARGET_PATH: $TARGET_PATH"
            exit 1
          fi
          mkdir -p "$TARGET_PATH"
          find "$TARGET_PATH" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf /tmp/search-agent.tar.gz -C "$TARGET_PATH"
          cd "$TARGET_PATH"
          {
            printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
            printf 'OPENAI_MODEL=%s\n' "${OPENAI_MODEL:-gpt-4o-mini}"
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'POSTGRES_DB=%s\n' "${POSTGRES_DB:-search_agent}"
            printf 'POSTGRES_USER=%s\n' "${POSTGRES_USER:-search_agent}"
            printf 'POSTGRES_PASSWORD=%s\n' "${POSTGRES_PASSWORD:-search_agent}"
          } > .env
          if docker compose version >/dev/null 2>&1; then
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
          else
            docker-compose -f docker-compose.prod.yml up -d --build --remove-orphans
          fi
          rm -f /tmp/search-agent.tar.gz
          EOF