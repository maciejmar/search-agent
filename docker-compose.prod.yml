services:
  postgres:
    image: postgres:16
    container_name: search-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-search_agent}
      POSTGRES_USER: ${POSTGRES_USER:-search_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-search_agent}
    volumes:
      - search-agent-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-search_agent} -d ${POSTGRES_DB:-search_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: search-agent-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8003:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://search_agent:search_agent@postgres:5432/search_agent}
      JWT_SECRET: ${JWT_SECRET:-change-me-search-agent}
      POSTGRES_DB: ${POSTGRES_DB:-search_agent}
      POSTGRES_USER: ${POSTGRES_USER:-search_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-search_agent}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: search-agent-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"

volumes:
  search-agent-postgres-data: